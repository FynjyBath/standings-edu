{{define "content"}}
<section class="page-head">
  <h1>Доска почёта</h1>
</section>

{{if .Summary.Rows}}
<div class="table-wrap summary-wrap">
  <table class="standings-table summary-table">
    <thead>
      <tr>
        <th class="student-col">Участник</th>
        {{range .Summary.Sites}}
        <th>{{siteTitle .}}</th>
        {{end}}
        <th class="total-col">Всего</th>
      </tr>
    </thead>
    <tbody>
      {{range .Summary.Rows}}
      <tr>
        <td class="student-name">{{.FullName}}</td>
        {{range .SolvedBySite}}
        <td class="site-solved">{{.}}</td>
        {{end}}
        <td class="total-cell">{{.TotalSolved}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="empty-hint">Сводка пока не сгенерирована.</p>
{{end}}
{{end}}
