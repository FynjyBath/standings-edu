{{define "layout"}}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>{{.PageTitle}}</title>
    <script>
      (function () {
        var storageKey = "nemalo-theme";
        var theme = "light";
        try {
          var saved = localStorage.getItem(storageKey);
          if (saved === "light" || saved === "dark") {
            theme = saved;
          }
        } catch (e) {}
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css" />

    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/static/favicon-48x48.png" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/standings">Nemalo Standings</a>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Переключить тему" aria-pressed="false">
          <span class="theme-icon theme-icon--sun" aria-hidden="true">☀</span>
          <span class="theme-icon theme-icon--moon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>
    <main class="container">
      {{template "content" .}}
    </main>
    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-line">Контакт: <a href="https://{{.Footer.Contact}}" target="_blank" rel="noopener noreferrer">{{.Footer.Contact}}</a></div>
        <div class="footer-line">Последнее обновление: {{.Footer.LastUpdatedMSK}}</div>
        <div class="footer-line">Время на сервере: {{.Footer.ServerTime}}</div>
      </div>
    </footer>
    <script>
      (function () {
        var storageKey = "nemalo-theme";
        var root = document.documentElement;
        var button = document.getElementById("theme-toggle");
        if (!button) {
          return;
        }

        function updateButton() {
          var isDark = root.getAttribute("data-theme") === "dark";
          button.setAttribute("aria-pressed", isDark ? "true" : "false");
          button.setAttribute("title", isDark ? "Тёмная тема" : "Светлая тема");
        }

        button.addEventListener("click", function () {
          var nextTheme = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
          root.setAttribute("data-theme", nextTheme);
          try {
            localStorage.setItem(storageKey, nextTheme);
          } catch (e) {}
          updateButton();
        });

        updateButton();
      })();
    </script>
  </body>
</html>
{{end}}
